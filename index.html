<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Cadastro de Cliente</h1>

<form action="https://script.google.com/macros/s/AKfycbyaz0X8gDlF3hHIZrSycfNjLIwfkmcC1OOy5LXJdDLIIu6i_y2QMlKiqP8W_iYazj03Uw/exec" method="post" enctype="multipart/form-data" autocomplete="off">

    <fieldset>
        <legend>Dados Pessoais</legend>

        Nome: <input type="text" name="nome" placeholder="Nome" required>
        CPF: <input  type="text" name="cpf"  placeholder="Digite 11 números" pattern="\d{11}"  title="Digite exatamente 11 números" maxlength="11"required>
        RG: <input type="text" name="rg" placeholder="RG">
        Email: <input type="email" name="email" placeholder="Email">
        N°Telefone: <input type="number" name="celular" placeholder="(88)1 1234-5678">
    </fieldset>

        <fieldset>
            <legend>Endereço</legend>
            Rua: <input type="text" name="rua" placeholder="Rua">
            Cidade:<select name="cidade" required>
             <option value="">Selecione a cidade</option>
             <option value="Juazeiro do Norte">Juazeiro do Norte</option>
             <option value="Crato">Crato</option>
             <option value="Barbalha">Barbalha</option>
              <option value="Fortaleza">Fortaleza</option>
              <option value="Sobral">Sobral</option>
            </select><br>
            N°Casa: <input type="number" name="numero" placeholder="Número"><br>
            Bairro: <input type="text" name="bairro" placeholder="Bairro">
            Estado: <select name="estado" required>
             <option value="">Selecione o Estado</option>
             <option value="AC">Acre</option>
             <option value="AL">Alagoas</option>
             <option value="AP">Amapá</option>
             <option value="AM">Amazonas</option>
              <option value="BA">Bahia</option>
              <option value="CE">Ceará</option>
              <option value="DF">Distrito Federal</option>
              <option value="ES">Espírito Santo</option>
              <option value="GO">Goiás</option>
              <option value="MA">Maranhão</option>
              <option value="MT">Mato Grosso</option>
              <option value="MS">Mato Grosso do Sul</option>
              <option value="MG">Minas Gerais</option>
              <option value="PA">Pará</option>
              <option value="PB">Paraíba</option>
              <option value="PR">Paraná</option>
              <option value="PE">Pernambuco</option>
              <option value="PI">Piauí</option>
              <option value="RJ">Rio de Janeiro</option>
              <option value="RN">Rio Grande do Norte</option>
              <option value="RS">Rio Grande do Sul</option>
              <option value="RO">Rondônia</option>
              <option value="RR">Roraima</option>
              <option value="SC">Santa Catarina</option>
              <option value="SP">São Paulo</option>
              <option value="SE">Sergipe</option>
              <option value="TO">Tocantins</option>
</select>
        </fieldset>
        
        <fieldset>
            <legend>Outros Dados</legend>
            Foto do Documento: <input type="file" name="foto" id="foto"accept="image/png, image/jpeg"required>
            Unidade Gemdora: <input type="number" name="login"required placeholder="Informe seu Login"><br>
            Unidade Beneficiaria: <input type="text" name="Senha"required placeholder="Informe sua senha"><br>
        </fieldset>
        <input type="reset">
        <input type="submit">
    </form>
    <script>
         document.addEventListener('contextmenu', event => event.preventDefault());

        document.querySelector("form").addEventListener("submit", function(e){
                alert("Enviando dados com segurança...");
});
</script>
</body>

</html>
